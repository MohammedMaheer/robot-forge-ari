apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
  namespace: robotforge
  labels:
    app: processing-service
    app.kubernetes.io/name: processing-service
    app.kubernetes.io/part-of: robotforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
        app.kubernetes.io/name: processing-service
    spec:
      containers:
        - name: processing-service
          image: ghcr.io/robotforge/processing-service:latest
          ports:
            - containerPort: 8002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: robotforge-config
            - secretRef:
                name: robotforge-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
  namespace: robotforge
  labels:
    app: processing-service
    app.kubernetes.io/name: processing-service
    app.kubernetes.io/part-of: robotforge
spec:
  type: ClusterIP
  selector:
    app: processing-service
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
