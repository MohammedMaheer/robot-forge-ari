apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming-service
  namespace: robotforge
  labels:
    app: streaming-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming-service
  template:
    metadata:
      labels:
        app: streaming-service
    spec:
      containers:
        - name: streaming-service
          image: robotforge/streaming-service:latest
          ports:
            - containerPort: 3004
              protocol: TCP
          env:
            - name: PORT
              value: "3004"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: robotforge-secrets
                  key: jwt-secret
            - name: LIVEKIT_URL
              valueFrom:
                configMapKeyRef:
                  name: robotforge-config
                  key: livekit-url
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: robotforge-secrets
                  key: livekit-api-key
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: robotforge-secrets
                  key: livekit-api-secret
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: robotforge-config
                  key: cors-origins
          resources:
            requests:
              memory: "128Mi"
              cpu: "125m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: streaming-service
  namespace: robotforge
  labels:
    app: streaming-service
spec:
  type: ClusterIP
  selector:
    app: streaming-service
  ports:
    - port: 3004
      targetPort: 3004
      protocol: TCP
      name: http
