apiVersion: v1
kind: Secret
metadata:
  name: robotforge-secrets
  namespace: robotforge
  labels:
    app.kubernetes.io/part-of: robotforge
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values with real secrets before deploying.
  # In production, use a secrets manager (e.g., AWS Secrets Manager, HashiCorp Vault)
