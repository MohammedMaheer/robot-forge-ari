apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-service
  namespace: robotforge
  labels:
    app: marketplace-service
    app.kubernetes.io/name: marketplace-service
    app.kubernetes.io/part-of: robotforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: marketplace-service
  template:
    metadata:
      labels:
        app: marketplace-service
        app.kubernetes.io/name: marketplace-service
    spec:
      containers:
        - name: marketplace-service
          image: ghcr.io/robotforge/marketplace-service:latest
          ports:
            - containerPort: 3002
              protocol: TCP
          envFrom:
            - configMapRef:
                name: robotforge-config
            - secretRef:
                name: robotforge-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: marketplace-service
  namespace: robotforge
  labels:
    app: marketplace-service
    app.kubernetes.io/name: marketplace-service
    app.kubernetes.io/part-of: robotforge
spec:
  type: ClusterIP
  selector:
    app: marketplace-service
  ports:
    - port: 3002
      targetPort: 3002
      protocol: TCP
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: marketplace-service
  namespace: robotforge
  labels:
    app: marketplace-service
    app.kubernetes.io/name: marketplace-service
    app.kubernetes.io/part-of: robotforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: marketplace-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
