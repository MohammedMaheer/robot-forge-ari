name: ROBOTFORGE Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  deploy-infrastructure:
    name: Deploy Infrastructure (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      eks_cluster_name: ${{ steps.tf-output.outputs.eks_cluster_name }}
      s3_bucket_name: ${{ steps.tf-output.outputs.s3_bucket_name }}
      alb_dns_name: ${{ steps.tf-output.outputs.alb_dns_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=robotforge-terraform-state" \
            -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var="environment=${{ inputs.environment }}" \
            -var="domain_name=${{ inputs.environment == 'production' && 'robotforge.io' || 'staging.robotforge.io' }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf-output
        working-directory: infra/terraform
        run: |
          echo "eks_cluster_name=$(terraform output -raw eks_cluster_name)" >> $GITHUB_OUTPUT
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "alb_dns_name=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT

  deploy-services:
    name: Deploy Services (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29.0"

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.deploy-infrastructure.outputs.eks_cluster_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Apply Kubernetes namespace
        run: kubectl apply -f infra/k8s/namespace.yaml

      - name: Apply ConfigMap and Secrets
        run: |
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/secrets.yaml
        env:
          ENVIRONMENT: ${{ inputs.environment }}

      - name: Deploy backend services
        run: |
          kubectl apply -f infra/k8s/auth-service.yaml
          kubectl apply -f infra/k8s/marketplace-service.yaml
          kubectl apply -f infra/k8s/collection-service.yaml
          kubectl apply -f infra/k8s/processing-service.yaml
          kubectl apply -f infra/k8s/gateway.yaml

      - name: Wait for rollouts to complete
        run: |
          kubectl -n robotforge rollout status deployment/auth-service --timeout=300s
          kubectl -n robotforge rollout status deployment/marketplace-service --timeout=300s
          kubectl -n robotforge rollout status deployment/collection-service --timeout=300s
          kubectl -n robotforge rollout status deployment/processing-service --timeout=300s
          kubectl -n robotforge rollout status deployment/gateway --timeout=300s

      - name: Verify deployments
        run: kubectl -n robotforge get pods -o wide

  deploy-web:
    name: Deploy Web PWA (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web application
        run: pnpm --filter @robotforge/web build
        env:
          VITE_API_URL: ${{ inputs.environment == 'production' && 'https://api.robotforge.io' || 'https://api.staging.robotforge.io' }}
          VITE_ENVIRONMENT: ${{ inputs.environment }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync apps/web/dist/ \
            s3://${{ needs.deploy-infrastructure.outputs.s3_bucket_name }}-web/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "sw.js"

          aws s3 cp apps/web/dist/index.html \
            s3://${{ needs.deploy-infrastructure.outputs.s3_bucket_name }}-web/index.html \
            --cache-control "public, max-age=0, must-revalidate"

          aws s3 cp apps/web/dist/sw.js \
            s3://${{ needs.deploy-infrastructure.outputs.s3_bucket_name }}-web/sw.js \
            --cache-control "public, max-age=0, must-revalidate" \
            2>/dev/null || true

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?contains(DomainName, '${{ needs.deploy-infrastructure.outputs.s3_bucket_name }}-web')]].Id" \
            --output text)
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths "/*"
          fi

  smoke-test:
    name: Smoke Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [deploy-services, deploy-web]
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set base URL
        id: urls
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "api_url=https://api.robotforge.io" >> $GITHUB_OUTPUT
            echo "web_url=https://app.robotforge.io" >> $GITHUB_OUTPUT
          else
            echo "api_url=https://api.staging.robotforge.io" >> $GITHUB_OUTPUT
            echo "web_url=https://staging.robotforge.io" >> $GITHUB_OUTPUT
          fi

      - name: Health check — Gateway
        run: |
          curl --retry 5 --retry-delay 10 --retry-all-errors \
            -f -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.api_url }}/health
          echo " Gateway is healthy"

      - name: Health check — Auth Service
        run: |
          STATUS=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.api_url }}/api/auth/health)
          if [ "$STATUS" != "200" ]; then
            echo "Auth service returned $STATUS"
            exit 1
          fi
          echo "Auth service is healthy"

      - name: Health check — Marketplace Service
        run: |
          STATUS=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.api_url }}/api/marketplace/health)
          if [ "$STATUS" != "200" ]; then
            echo "Marketplace service returned $STATUS"
            exit 1
          fi
          echo "Marketplace service is healthy"

      - name: Health check — Collection Service
        run: |
          STATUS=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.api_url }}/api/collection/health)
          if [ "$STATUS" != "200" ]; then
            echo "Collection service returned $STATUS"
            exit 1
          fi
          echo "Collection service is healthy"

      - name: Health check — Processing Service
        run: |
          STATUS=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.api_url }}/api/processing/health)
          if [ "$STATUS" != "200" ]; then
            echo "Processing service returned $STATUS"
            exit 1
          fi
          echo "Processing service is healthy"

      - name: Health check — Web Application
        run: |
          STATUS=$(curl --retry 5 --retry-delay 10 --retry-all-errors \
            -s -o /dev/null -w "%{http_code}" \
            ${{ steps.urls.outputs.web_url }})
          if [ "$STATUS" != "200" ]; then
            echo "Web application returned $STATUS"
            exit 1
          fi
          echo "Web application is healthy"

      - name: Verify API responsiveness
        run: |
          echo "Testing API response time..."
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" \
            ${{ steps.urls.outputs.api_url }}/health)
          echo "Gateway response time: ${RESPONSE_TIME}s"
          if (( $(echo "$RESPONSE_TIME > 5.0" | bc -l) )); then
            echo "WARNING: Gateway response time exceeds 5s threshold"
            exit 1
          fi
