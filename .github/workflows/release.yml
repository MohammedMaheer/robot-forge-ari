name: ROBOTFORGE Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/robotforge

jobs:
  build-web:
    name: Build Web PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web application
        run: pnpm --filter @robotforge/web build
        env:
          VITE_API_URL: https://api.robotforge.io
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 30

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: desktop-linux
            artifact-glob: "apps/desktop/release/*.{AppImage,deb,rpm}"
          - os: macos-latest
            artifact-name: desktop-macos
            artifact-glob: "apps/desktop/release/*.{dmg,zip}"
          - os: windows-latest
            artifact-name: desktop-windows
            artifact-glob: "apps/desktop/release/*.{exe,msi}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop application
        run: pnpm --filter @robotforge/desktop build
        env:
          VITE_API_URL: https://api.robotforge.io
          VITE_APP_VERSION: ${{ github.ref_name }}

      - name: Build Electron distributables
        run: pnpm --filter @robotforge/desktop exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-glob }}
          retention-days: 30

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: gateway
            context: apps/backend/gateway
            dockerfile: apps/backend/gateway/Dockerfile
          - name: auth-service
            context: apps/backend/auth-service
            dockerfile: apps/backend/auth-service/Dockerfile
          - name: marketplace-service
            context: apps/backend/marketplace-service
            dockerfile: apps/backend/marketplace-service/Dockerfile
          - name: collection-service
            context: apps/backend/collection-service
            dockerfile: apps/backend/collection-service/Dockerfile
          - name: processing-service
            context: apps/backend/processing-service
            dockerfile: apps/backend/processing-service/Dockerfile
          - name: packaging-service
            context: apps/backend/packaging-service
            dockerfile: apps/backend/packaging-service/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-web, build-desktop, publish-docker]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ROBOTFORGE ${{ github.ref_name }}
          body: |
            ## ROBOTFORGE ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### Docker Images
            All backend service images are published to GHCR:
            - `${{ env.IMAGE_PREFIX }}/gateway:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}/auth-service:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}/marketplace-service:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}/collection-service:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}/processing-service:${{ github.ref_name }}`
            - `${{ env.IMAGE_PREFIX }}/packaging-service:${{ github.ref_name }}`

            ### Downloads
            Desktop and web builds are attached below.
          files: |
            release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
