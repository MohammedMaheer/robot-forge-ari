# LiveKit Server Configuration — ROBOTFORGE Streaming Service

port: 7880

rtc:
  port_range_start: 7881
  port_range_end: 7900
  use_external_ip: false
  tcp_fallback_port: 7881

keys:
  devkey: secret

room:
  max_participants: 10
  empty_timeout: 300     # seconds before an empty room is closed
  auto_create: true

redis:
  address: "localhost:6379"
  db: 0

logging:
  level: info
  json: false

webhook:
  urls: []

turn:
  enabled: false
