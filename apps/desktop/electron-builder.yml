appId: com.robotforge.desktop
productName: ROBOTFORGE
copyright: Copyright © 2026 Acceleration Robotics

directories:
  buildResources: resources
  output: release

files:
  - dist/**
  - node_modules/**

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: "${productName}-${version}-Setup.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}.${ext}"

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons
  category: Development
  artifactName: "${productName}-${version}.${ext}"

publish:
  provider: generic
  url: https://releases.robotforge.io
